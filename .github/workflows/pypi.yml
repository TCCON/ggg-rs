name: Build wheels for PyPI
on:
  workflow_dispatch
  #release:
  #  types: [published]

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux ARM64 (Native Runner)
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # macOS (Maturin handles Universal binaries by default on macos-latest)
          - os: macos-latest
            target: aarch64-apple-darwin
          # Excluding windows, at least for now. The github run failed, and we
          # don't really support windows anyway.
          # Windows x86_64
          #- os: windows-latest
          #  target: x86_64-pc-windows-msvc

    steps:
      # v6 commit on 22 May 2026
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        # stable branch
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      # Crucial for 'netcdf' static build: needs cmake to compile C dependencies
      - name: Install Build Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - name: Install Build Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      # v1 commit on 22 May 2026
      - name: Build wheels
        uses: messense/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --sdist
          # 'auto' ensures manylinux compatibility for Linux wheels
          manylinux: auto

      # v7 tag on 22 May 2026
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: dist
  publish-to-testpypi:
    name: Publish Python distribution to TestPyPI
    #if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build_wheels
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/ggg-rs

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    # Took the commit for v8.0.1 on 26 Mar 2026
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
    - name: Publish distribution to TestPyPI
      # Pinned commit for v1.13.0 on 26 Mar 2026
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
      with:
        repository-url: https://test.pypi.org/legacy/
